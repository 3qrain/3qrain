services:
  redis:
    image: redis:alpine
    container_name: 3qrain-redis
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      TZ: Asia/Shanghai
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    restart: unless-stopped
    volumes:
      - ./apps/server/data/redis:/data

volumes:
  redis-data:
    name: 3qrain-redis-data
